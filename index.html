// ─── FIRESTORE REST API ───────────────────────────────────────────────────────
const _FB_BASE="https://firestore.googleapis.com/v1/projects/moha-shopping/databases/(default)/documents";
const _FB_KEY="AIzaSyDug0mvi3uVmJIWuC8icwmAF1Z72gnUjd4";

function _parseVal(v){
  if(!v)return null;
  if(v.stringValue!==undefined)return v.stringValue;
  if(v.integerValue!==undefined)return Number(v.integerValue);
  if(v.doubleValue!==undefined)return Number(v.doubleValue);
  if(v.booleanValue!==undefined)return v.booleanValue;
  return null;
}
function _parseDoc(doc){
  const id=doc.name.split("/").pop();
  const data={};
  for(const[k,v]of Object.entries(doc.fields||{}))data[k]=_parseVal(v);
  return{id,...data};
}
function _toFields(obj){
  const f={};
  for(const[k,v]of Object.entries(obj)){
    if(v===null||v===undefined)continue;
    if(typeof v==="string")f[k]={stringValue:v};
    else if(typeof v==="number"&&Number.isInteger(v))f[k]={integerValue:String(v)};
    else if(typeof v==="number")f[k]={doubleValue:v};
    else if(typeof v==="boolean")f[k]={booleanValue:v};
  }
  return f;
}
async function fbGetProducts(){
  const r=await fetch(`${_FB_BASE}/products?key=${_FB_KEY}&pageSize=300`);
  if(!r.ok)throw new Error("HTTP "+r.status);
  const d=await r.json();
  return(d.documents||[]).map(_parseDoc);
}
async function fbAddProduct(prod){
  const r=await fetch(`${_FB_BASE}/products?key=${_FB_KEY}`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({fields:_toFields(prod)})
  });
  if(!r.ok){const e=await r.json();throw new Error(e.error?.message||"HTTP "+r.status);}
  return _parseDoc(await r.json());
}
async function fbDeleteProduct(id){
  const r=await fetch(`${_FB_BASE}/products/${id}?key=${_FB_KEY}`,{method:"DELETE"});
  if(!r.ok)throw new Error("HTTP "+r.status);
}

function getLS(k,def){try{const v=localStorage.getItem(k);return v?JSON.parse(v):def}catch{return def}}
function setLS(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}

// ─── MAIN APP ────────────────────────────────────
function App(){
  const [user,setUser]=useState(null);
  const [isAdmin,setIsAdmin]=useState(false);
  const [modal,setModal]=useState(null);
  const [cart,setCart]=useState([]);
  const [products,setProducts]=useState([]);
  const [users,setUsers]=useState(getLS("moha_users",[]));
  const [cat,setCat]=useState("すべて");
  const [search,setSearch]=useState("");

  // Firestoreから商品をポーリング（10秒ごと）
  useEffect(()=>{
    let active=true;
    async function load(){
      try{
        const prods=await fbGetProducts();
        if(active)setProducts(prods);
      }catch(e){console.warn("[MOHA] 商品取得失敗:",e);}
    }
    load();
    const t=setInterval(load,10000);
    return()=>{active=false;clearInterval(t);};
  },[]);
  useEffect(()=>{setLS("moha_users",users)},[users]);

  const filtered=products.filter(p=>{
    const mc=cat==="すべて"||p.cat===cat;
    const ms=!search||p.name.toLowerCase().includes(search.toLowerCase())||p.cat.toLowerCase().includes(search.toLowerCase())||p.desc.toLowerCase().includes(search.toLowerCase());
    return mc&&ms;
  });

  const cartCount=cart.reduce((s,i)=>s+i.qty,0);
  const cartTotal=cart.reduce((s,i)=>s+i.price*i.qty,0);

  function addToCart(p){
    if(!user&&!isAdmin){setModal("login");return;}
    setCart(c=>{
      const ex=c.find(i=>i.id===p.id);
      if(ex)return c.map(i=>i.id===p.id?{...i,qty:i.qty+1}:i);
      return[...c,{...p,qty:1}];
    });
  }
  function removeFromCart(id){setCart(c=>c.filter(i=>i.id!==id))}
  function changeQty(id,d){setCart(c=>c.map(i=>i.id===id?{...i,qty:Math.max(1,i.qty+d)}:i))}
  function logout(){setUser(null);setIsAdmin(false);setCart([]);setModal(null)}

  return(
    <div className="app">
      <style>{S}</style>
      <div className="scanline"/>

      {/* NAV */}
      <nav className="nav">
        <div className="logo" onClick={()=>{setCat("すべて");setSearch("")}}>MOHA<em>GAMING</em></div>

        {user&&!isAdmin&&<span className="utag">👤 {user.name}</span>}
        {isAdmin&&<button className="nbtn prim" onClick={()=>setModal("admin")}>⚙ 管理画面</button>}
        {(user||isAdmin)&&<button className="nbtn red" onClick={logout}>ログアウト</button>}
        {!user&&!isAdmin&&(
          <>
            <button className="nbtn" onClick={()=>setModal("login")}>ログイン</button>
            <button className="nbtn prim" onClick={()=>setModal("signup")}>新規登録</button>
          </>
        )}
        <div className="cartbtn">
          <button className="nbtn" onClick={()=>(user||isAdmin)?setModal("cart"):setModal("login")}>
            🛒 カート{cartCount>0&&<span className="badge">{cartCount}</span>}
          </button>
        </div>
      </nav>

      {/* HERO */}
      <div className="hero">
        <div className="hero-grid"/>
        <h1>最高の<span className="glow">ゲーミング体験</span>を<br/>あなたの手に</h1>
        <p>プロ仕様ゲーミングデバイス　|　全品正規品保証　|　即日発送対応</p>
        <div className="hero-line"/>
      </div>

      {/* SEARCH */}
      <div className="srow">
        <input className="sinp" placeholder="🔍　商品を検索..." value={search} onChange={e=>setSearch(e.target.value)}/>
      </div>

      {/* CATEGORIES */}
      <div className="cats">
        {CATS.map(c=><button key={c} className={"cbt"+(cat===c?" act":"")} onClick={()=>setCat(c)}>{c}</button>)}
      </div>

      <div className="result-count">{filtered.length}件の商品</div>

      {/* PRODUCT GRID */}
      {filtered.length===0
        ?<div className="empty">😞 商品が見つかりませんでした</div>
        :<div className="grid">{filtered.map(p=><Card key={p.id} p={p} add={addToCart} loggedIn={!!(user||isAdmin)}/>)}</div>
      }

      <footer className="footer">© 2025 MOHA GAMING <span>—</span> ALL RIGHTS RESERVED</footer>

      {/* MODALS */}
      {modal==="login"&&<AuthModal mode="login" close={()=>setModal(null)} setModal={setModal} setUser={setUser} setIsAdmin={setIsAdmin} users={users} setUsers={setUsers}/>}
      {modal==="signup"&&<AuthModal mode="signup" close={()=>setModal(null)} setModal={setModal} setUser={setUser} setIsAdmin={setIsAdmin} users={users} setUsers={setUsers}/>}
      {modal==="cart"&&<CartModal close={()=>setModal(null)} cart={cart} remove={removeFromCart} changeQty={changeQty} total={cartTotal} setModal={setModal}/>}
      {modal==="notice"&&<NoticeModal close={()=>setModal(null)} cart={cart} total={cartTotal} setModal={setModal}/>}
      {modal==="order"&&<OrderModal close={()=>setModal(null)} cart={cart} total={cartTotal} setCart={setCart} setModal={setModal}/>}
      {modal==="admin"&&isAdmin&&<AdminModal close={()=>setModal(null)} products={products} setProducts={setProducts} users={users}/>}
    </div>
  );
}

  function handleLogin(){
    setErr("");
    if(!email.trim()||!pass.trim()){setErr("入力してください");return;}
    // Admin check
    if(email.trim()===ADMIN_EMAIL&&pass===ADMIN_PASS){setIsAdmin(true);close();return;}
    // User check
    const u=users.find(u=>u.email===email.trim()&&u.pass===pass);
    if(!u){setErr("メールアドレスまたはパスワードが間違っています");return;}
    setUser(u);close();
  }

  function handleSignup(){
    setErr("");
    if(!name.trim()||!email.trim()||!pass.trim()){setErr("すべての項目を入力してください");return;}

// ─── ADMIN MODAL ──────────────────────────────────
function AdminModal({close,products,setProducts,users}){
  const [tab,setTab]=useState("list");
  const [form,setForm]=useState({name:"",cat:CATS[1],price:"",img:"",desc:"",stock:""});
  const [imgPreview,setImgPreview]=useState("");
  const [err,setErr]=useState("");
  const [ok,setOk]=useState("");
  const [showCam,setShowCam]=useState(false);
  const videoRef=useRef(null);
  const streamRef=useRef(null);
  const canvasRef=useRef(null);

  async function startCamera(){
    try{
      const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"},audio:false});
      streamRef.current=s;
      if(videoRef.current)videoRef.current.srcObject=s;
      setShowCam(true);
    }catch(e){alert("カメラにアクセスできませんでした")}
  }
  function stopCamera(){
    if(streamRef.current)streamRef.current.getTracks().forEach(t=>t.stop());
    setShowCam(false);
  }
  function snapPhoto(){
    if(!videoRef.current)return;
    const cv=document.createElement("canvas");
    cv.width=videoRef.current.videoWidth;
    cv.height=videoRef.current.videoHeight;
    cv.getContext("2d").drawImage(videoRef.current,0,0);
    const data=cv.toDataURL("image/jpeg",0.85);
    setImgPreview(data);
    setForm(f=>({...f,img:data}));
    stopCamera();
  }
  function handleFileUpload(e){
    const file=e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      setImgPreview(ev.target.result);
      setForm(f=>({...f,img:ev.target.result}));
    };
    reader.readAsDataURL(file);
  }

  async function handleAdd(){
    setErr("");setOk("");
    if(!form.name.trim()||!form.price||!form.stock){setErr("商品名・価格・在庫は必須です");return;}
    const imgUrl=form.img||"https://placehold.co/400x175/070f18/00f0ff?text=NO+IMAGE";
    const newProd={name:form.name.trim(),cat:form.cat,price:parseInt(form.price)||0,stock:parseInt(form.stock)||0,img:imgUrl,desc:form.desc,createdAt:Date.now()};
    try{
      const added=await fbAddProduct(newProd);
      setProducts(pp=>[added,...pp]);
      setOk("✓ 商品を追加しました！");
      setForm({name:"",cat:CATS[1],price:"",img:"",desc:"",stock:""});
      setImgPreview("");
      setTimeout(()=>setOk(""),3500);
    }catch(e){setErr("追加失敗: "+e.message);}
  }
  async function delProd(id){
    if(!window.confirm("この商品を削除しますか？"))return;
    try{
      await fbDeleteProduct(id);
      setProducts(pp=>pp.filter(p=>p.id!==id));
    }catch(e){alert("削除失敗: "+e.message);}
  }

  return(
    <div className="mbg" onClick={e=>{if(e.target===e.currentTarget){stopCamera();close()}}}>
      <div className="modal modal-wide">
        <div className="mhead">
          <h2>⚙ 管理画面</h2>
          <button className="xbtn" onClick={()=>{stopCamera();close()}}>✕</button>
        </div>
        <div className="mbody">
          <div className="tabrow">
            <div className={"tab"+(tab==="list"?" act":"")} onClick={()=>setTab("list")}>商品一覧</div>
            <div className={"tab"+(tab==="add"?" act":"")} onClick={()=>setTab("add")}>商品追加</div>
            <div className={"tab"+(tab==="users"?" act":"")} onClick={()=>setTab("users")}>ユーザー</div>
          </div>

          {/* PRODUCT LIST */}
          {tab==="list"&&(
            <div>
              <div className="asec">
                <h3>登録商品 — {products.length}件</h3>
              </div>
              {products.length===0
                ?<div style={{color:"#2a4a6a",textAlign:"center",padding:"30px",fontSize:"13px",fontFamily:"'Orbitron',monospace"}}>商品がまだ登録されていません</div>
                :products.map(p=>(
                  <div key={p.id} className="prow">
                    <img className="piimg" src={p.img} alt={p.name} onError={e=>{e.target.src="https://placehold.co/46/070f18/00f0ff?text=IMG"}}/>
                    <div className="pinfo">
                      <div className="pname2">{p.name}</div>
                      <div className="pmeta">{p.cat} | ¥{p.price.toLocaleString()} | 在庫:{p.stock}</div>
                    </div>
                    <button className="dbtn" onClick={()=>delProd(p.id)}>削除</button>
                  </div>
                ))
              }
            </div>
          )}

          {/* ADD PRODUCT */}
          {tab==="add"&&(
            <div>
              {err&&<div className="err">{err}</div>}
              {ok&&<div className="ok">{ok}</div>}

              <label className="inp-label">商品名 *</label>
              <input className="inp" placeholder="例: ProX メカニカルキーボード RGB" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/>

              <label className="inp-label">カテゴリー *</label>
              <select className="inp" value={form.cat} onChange={e=>setForm(f=>({...f,cat:e.target.value}))}>
                {CATS.slice(1).map(c=><option key={c}>{c}</option>)}
              </select>

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
                <div>
                  <label className="inp-label">価格（円）*</label>
                  <input className="inp" type="number" placeholder="例: 12800" value={form.price} onChange={e=>setForm(f=>({...f,price:e.target.value}))}/>
                </div>
                <div>
                  <label className="inp-label">在庫数 *</label>
                  <input className="inp" type="number" placeholder="例: 10" value={form.stock} onChange={e=>setForm(f=>({...f,stock:e.target.value}))}/>
                </div>
              </div>

              <label className="inp-label">商品画像</label>
              {/* Camera */}
              {showCam?(
                <div>
                  <video ref={videoRef} className="cam" autoPlay playsInline muted/>
                  <button className="snap-btn" onClick={snapPhoto}>📸 撮影する</button>
                  <button className="close-cam" onClick={stopCamera}>キャンセル</button>
                </div>
              ):(
                <>
                  <div className="upload-area">
                    <input type="file" accept="image/*" onChange={handleFileUpload}/>
                    <div className="upload-text">📁 <span>ファイルを選択</span> またはドラッグ&ドロップ</div>
                  </div>
                  <button className="camera-btn" onClick={startCamera}>📷 カメラで撮影する</button>
                  <label className="inp-label">または画像URL</label>
                  <input className="inp" placeholder="https://..." value={form.img.startsWith("data:")?"":(form.img||"")} onChange={e=>{setForm(f=>({...f,img:e.target.value}));setImgPreview(e.target.value)}}/>
                </>
              )}

              {imgPreview&&!showCam&&(
                <div>
                  <img src={imgPreview} alt="プレビュー" className="img-prev" onError={e=>{e.target.style.display="none"}}/>
                  <button onClick={()=>{setImgPreview("");setForm(f=>({...f,img:""}))}} style={{background:"transparent",border:"1px solid #1a3a5c",color:"#ff6699",cursor:"pointer",borderRadius:"5px",padding:"5px 12px",fontSize:"12px",marginBottom:"13px",fontFamily:"'Rajdhani',sans-serif",fontWeight:"700"}}>✕ 画像を削除</button>
                </div>
              )}

              <label className="inp-label">商品説明（任意）</label>
              <textarea className="inp" placeholder="商品の特徴・スペックなど..." rows="3" value={form.desc} onChange={e=>setForm(f=>({...f,desc:e.target.value}))}/>

              <button className="bfull bcyan" onClick={handleAdd}>＋　商品を追加する</button>
            </div>
          )}

          {/* USERS */}
          {tab==="users"&&(
            <div>
              <div className="asec">
                <h3>登録ユーザー — {users.length}人</h3>
              </div>
              {users.length===0
                ?<div style={{color:"#2a4a6a",textAlign:"center",padding:"30px",fontSize:"13px",fontFamily:"'Orbitron',monospace"}}>ユーザーはまだいません</div>
                :users.map(u=>(
                  <div key={u.id} className="urow">
                    <div className="uav">{u.name[0]?.toUpperCase()||"?"}</div>
                    <div className="uinfo">
                      <div className="uname3">
                        {u.name}
                        {u.isGoogle&&<span style={{marginLeft:"7px",fontSize:"10px",color:"#4285f4",border:"1px solid #4285f440",padding:"1px 6px",borderRadius:"8px",fontWeight:"700"}}>Google</span>}
                      </div>
                      <div className="uemail">{u.email}</div>
                    </div>
                  </div>
                ))
              }
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
